<template>
    <lightning-card title="Get Account Record" icon-name="standard:account">
     
        <div class="slds-m-around_medium">
           <lightning-input label="Enter Name"
                                value={accName}
                                onchange={handleChange}
                               placeholder="Type Name Here...">
            </lightning-input>

        </div>


        <template if:true={flag}>
         <div class="slds-m-around_medium">
            <lightning-datatable key-field="Id" 
                                data={accountRecords}
                                 columns={accountColumns}
                                  hide-checkbox-column>
            </lightning-datatable>
        </div>
        </template>

        <template if:false={flag}>
            <div class="slds-text-color_error">
               Record not found
            </div>
        </template>


    </lightning-card>    
</template>
